# Reusable Go CI for vista-cloud-dev. Lint, race-tested coverage, optional
# schema-contract check, and a static cross-compile matrix.
#
# Call it from a repo with:
#   jobs:
#     ci:
#       uses: vista-cloud-dev/.github/.github/workflows/go-ci.yml@main
name: go-ci

on:
  workflow_call:
    inputs:
      go-version:
        description: Go toolchain version
        type: string
        default: "1.26.x"
      schema-check:
        description: Run `go run . schema | json.tool` contract check
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          check-latest: true
      - name: lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      - name: test
        run: go test -race -cover ./...
      - name: schema contract (must emit valid JSON)
        if: ${{ inputs.schema-check }}
        run: go run . schema | python3 -m json.tool > /dev/null

  build-matrix:
    runs-on: ubuntu-latest
    needs: lint-test
    strategy:
      matrix:
        target:
          - linux/amd64
          - linux/arm64
          - darwin/arm64
          - windows/amd64
    env:
      CGO_ENABLED: "0" # static, no-libc (spec §10)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
      - name: build ${{ matrix.target }}
        run: |
          os=${{ matrix.target }}; GOOS=${os%/*} GOARCH=${os#*/} \
            go build -trimpath -ldflags "-s -w" -o /dev/null .
